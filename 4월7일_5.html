<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        #red {
            position: fixed;
            background-color: red;
            display: inline-block;
            left: 100px;
            top: 10px;
        }
        #yellow {
            position: fixed;
            background-color: yellow;
            display: inline-block;
            left: 200px;
            top: 100px;
        }
        #green {
            position: fixed;
            background-color: green;
            display: inline-block;
            left: 250px;
            top: 100px;
        }
        #blue {
            position: fixed;
            background-color: blue;
            display: inline-block;
            left: 250px;
            top: 200px;
        }
    </style>
</head>
<body>
    <div id="red" style="width: 50px; height:50px"></div>
    <div id="yellow" style="width: 200px; height:200px"></div>
    <div id="green" style="width: 50px; height:50px"></div>
    <div id="blue" style="width: 50px; height:50px"></div>
</body>
</html>
